<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk / Daftar - EventHive</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-page">
    <div class="hero-bg"></div>
    <div class="hero-particles" id="particles"></div>
    
    <div class="auth-card animate-scale-in">
      <div class="auth-logo">
        <div class="logo-icon mx-auto" style="width: 48px; height: 48px; background: var(--gradient-violet-cyan); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto">🐝</div>
        <h2 id="auth-title" data-i18n="auth.login.title">Selamat Datang Kembali</h2>
        <p class="text-secondary">Silakan masuk ke akun Anda</p>
      </div>
      
      <div class="tabs">
        <button class="tab-btn active" id="tab-login">Masuk</button>
        <button class="tab-btn" id="tab-register">Daftar</button>
      </div>
      
      <!-- Login Form -->
      <form id="login-form" class="auth-form active-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="email@contoh.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-toggle">
            <input type="password" id="login-pwd" class="form-input" placeholder="Masukkan password" required>
            <button type="button" class="toggle-pwd-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-login">Masuk</button>
      </form>
      
      <!-- Register Form -->
      <form id="register-form" class="auth-form" style="display: none;">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Nama sesuai KTP" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="reg-email" class="form-input" placeholder="email@contoh.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-toggle">
            <input type="password" id="reg-pwd" class="form-input" placeholder="Minimal 6 karakter" required minlength="6">
            <button type="button" class="toggle-pwd-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-register">Daftar Akun</button>
      </form>
      
      <div class="auth-footer">
        <a href="index.html">Kembali ke Beranda</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/navbar.js"></script> <!-- To get the toast functionality -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Background Particles
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 6 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        const colors = ['#8b5cf6', '#06b6d4', '#ec4899'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
        particle.style.animationDelay = `${Math.random() * 5}s`;
        particlesContainer.appendChild(particle);
      }

      // Tabs Logic
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin = document.getElementById('login-form');
      const formRegister = document.getElementById('register-form');
      const title = document.getElementById('auth-title');
      
      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        formLogin.style.display = 'flex';
        formRegister.style.display = 'none';
        title.textContent = 'Selamat Datang Kembali';
      });
      
      tabRegister.addEventListener('click', () => {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        formRegister.style.display = 'flex';
        formLogin.style.display = 'none';
        title.textContent = 'Buat Akun Baru';
      });
      
      // Password Toggle
      document.querySelectorAll('.toggle-pwd-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = btn.previousElementSibling;
          if (input.type === 'password') {
            input.type = 'text';
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
          } else {
            input.type = 'password';
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
          }
        });
      });

      // Redirect URL checking
      const urlParams = new URLSearchParams(window.location.search);
      const redirectUrl = urlParams.get('redirect') || 'dashboard.html';

      // Login/Register Logic
      const usersKey = 'eventhive_users';
      
      // Seed dummy user if not exists
      let users = JSON.parse(localStorage.getItem(usersKey) || '[]');
      if (users.length === 0) {
        users.push({
          id: 'usr_1',
          name: 'Demo Admin',
          email: 'admin@demo.com',
          password: 'password123'
        });
        localStorage.setItem(usersKey, JSON.stringify(users));
      }

      formLogin.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const pwd = document.getElementById('login-pwd').value;
        const btn = document.getElementById('btn-login');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner spinner-sm" style="border-top-color: white"></div>';
        
        setTimeout(() => {
          users = JSON.parse(localStorage.getItem(usersKey) || '[]');
          const user = users.find(u => u.email === email && u.password === pwd);
          
          if (user) {
            localStorage.setItem('eventhive_session', JSON.stringify({id: user.id, name: user.name, email: user.email}));
            window.toast.show('Login berhasil!', 'success');
            setTimeout(() => {
              window.location.href = redirectUrl;
            }, 1000);
          } else {
            window.toast.show('Email atau password salah', 'error');
            btn.disabled = false;
            btn.textContent = 'Masuk';
          }
        }, 1000);
      });

      formRegister.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const pwd = document.getElementById('reg-pwd').value;
        const btn = document.getElementById('btn-register');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner spinner-sm" style="border-top-color: white"></div>';
        
        setTimeout(() => {
          users = JSON.parse(localStorage.getItem(usersKey) || '[]');
          
          if (users.some(u => u.email === email)) {
            window.toast.show('Email sudah terdaftar', 'error');
            btn.disabled = false;
            btn.textContent = 'Daftar Akun';
            return;
          }
          
          const newUser = {
            id: 'usr_' + Date.now(),
            name,
            email,
            password: pwd
          };
          
          users.push(newUser);
          localStorage.setItem(usersKey, JSON.stringify(users));
          
          // Auto login
          localStorage.setItem('eventhive_session', JSON.stringify({id: newUser.id, name: newUser.name, email: newUser.email}));
          
          window.toast.show('Registrasi berhasil!', 'success');
          setTimeout(() => {
            window.location.href = redirectUrl;
          }, 1000);
        }, 1500);
      });
    });
  </script>
</body>
</html>
